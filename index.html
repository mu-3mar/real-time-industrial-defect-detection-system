<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>QC-SCM Production Dashboard</title>

<style>
:root {
    --t50: #EDF8F7;
    --t700: #2A6F67;
    --t800: #1C4A45;
}

body {
    margin:0;
    font-family:system-ui;
    background:var(--t50);
    color:var(--t800);
}

.header {
    background:var(--t700);
    color:white;
    padding:18px;
    font-size:22px;
    font-weight:bold;
}

.container {
    display:flex;
    gap:25px;
    padding:25px;
}

.line {
    background:white;
    border-radius:14px;
    padding:20px;
    flex:1;
}

button {
    padding:10px;
    margin:4px;
    border-radius:8px;
    border:none;
    background:#6BC7BC;
    color:white;
    cursor:pointer;
}

button.stop {
    background:#e57373;
}

video {
    width:100%;
    background:black;
}
</style>
</head>

<body>

<div class="header">
QC-SCM Production Lines Dashboard
</div>

<div class="container">

<div class="line" id="line1">
<h3>Production Line 1</h3>
<button onclick="openSession(1)">Open</button>
<button onclick="closeSession(1)" class="stop">Close</button>
<button onclick="startStream(1)">Start Stream</button>
<button onclick="stopStream(1)" class="stop">Stop Stream</button>
<button onclick="listSessions(1)">List Sessions</button>

<div class="status">Disconnected</div>
<video autoplay playsinline muted></video>
<pre></pre>
</div>

<div class="line" id="line2">
<h3>Production Line 2</h3>
<button onclick="openSession(2)">Open</button>
<button onclick="closeSession(2)" class="stop">Close</button>
<button onclick="startStream(2)">Start Stream</button>
<button onclick="stopStream(2)" class="stop">Stop Stream</button>
<button onclick="listSessions(2)">List Sessions</button>

<div class="status">Disconnected</div>
<video autoplay playsinline muted></video>
<pre></pre>
</div>

</div>

<script>

const BASE_URL = "https://supereligible-fermina-clangorous.ngrok-free.dev";

// Set to true only for testing TURN relay; forces iceTransportPolicy: "relay"
const DEBUG_TURN_ONLY = false;

const pcs = {};
const sessions = {};

const CAMERAS = {
    1:"/dev/v4l/by-id/v4l2loopback-DroidCam-video",
    2:"/dev/v4l/by-id/usb-CN0V976R8LG0019NANWSA01_Integrated_Webcam_HD-video-index0"
};

function randomID(line){
    return "line"+line+"_"+Math.random().toString(36).substring(2,8);
}

function getLine(id){
    return document.getElementById("line"+id);
}

function log(id,msg){
    getLine(id).querySelector("pre").textContent =
        typeof msg==="string"?msg:JSON.stringify(msg,null,2);
}

function status(id,msg){
    getLine(id).querySelector(".status").textContent = msg;
}

async function api(path,method="GET",body=null){

    const opt={method,headers:{"Content-Type":"application/json"}};

    if(body) opt.body=JSON.stringify(body);

    const res=await fetch(BASE_URL+path,opt);

    if(!res.ok) throw await res.text();

    return await res.json();
}

function getData(id){
    return {
        report_id:sessions[id],
        production_line:"line"+id,
        camera_source:CAMERAS[id]
    };
}

async function openSession(id){
    sessions[id]=randomID(id);
    log(id,await api("/api/sessions/open","POST",getData(id)));
}

async function closeSession(id){
    stopStream(id);
    log(id,await api("/api/sessions/close","POST",getData(id)));
}

async function listSessions(id){
    log(id,await api("/api/sessions"));
}

async function startStream(id){

    const data=getData(id);
    const line=getLine(id);
    const video=line.querySelector("video");

    if(pcs[id]) pcs[id].close();

    // Production-ready WebRTC ICE: STUN for direct, TURN for relay fallback
    const pc = new RTCPeerConnection({
        iceServers: [
            { urls: "stun:20.51.117.96:3478" },
            {
                urls: "turn:20.51.117.96:3478",
                username: "turnuser",
                credential: "Sup3r$tr0ngP@ssw0rd"
            }
        ],
        iceTransportPolicy: DEBUG_TURN_ONLY ? "relay" : "all"
    });

    pcs[id]=pc;

    pc.onicecandidate = (e) => {
        if (e.candidate) {
            const type = e.candidate.type || "unknown";
            console.log("ICE candidate gathered: type=" + type);
        }
    };

    pc.onconnectionstatechange = () => {
        console.log("connectionState:", pc.connectionState);
    };

    pc.oniceconnectionstatechange = async () => {
        const iceState = pc.iceConnectionState;
        console.log("iceConnectionState:", iceState);

        if (iceState === "connected" || iceState === "completed") {
            let transport = "unknown";
            try {
                const stats = await pc.getStats();
                stats.forEach(report => {
                    if (report.type === "candidate-pair" && (report.selected || report.nominated)) {
                        const local = stats.get(report.localCandidateId);
                        const remote = stats.get(report.remoteCandidateId);
                        const localType = local && local.candidateType;
                        const remoteType = remote && remote.candidateType;
                        if (localType === "relay" || remoteType === "relay") {
                            transport = "turn-relay";
                        } else {
                            transport = "direct";
                        }
                    }
                });
            } catch (e) {
                console.warn("Failed to inspect ICE stats:", e);
            }
            console.log(`WebRTC Connected via: ${transport}`);
        }
    };

    pc.ontrack=e=>{
        video.srcObject=e.streams[0];
        status(id,"Streaming");
    };

    pc.addTransceiver('video',{direction:'recvonly'});

    await pc.setLocalDescription(await pc.createOffer());

    const res=await fetch(BASE_URL+"/webrtc/offer",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            sdp:pc.localDescription.sdp,
            type:pc.localDescription.type,
            report_id:data.report_id
        })
    });

    const answer=await res.json();

    await pc.setRemoteDescription(answer);

    status(id,"Connected");
}

function stopStream(id){
    if(pcs[id]){
        pcs[id].close();
        delete pcs[id];
    }
    getLine(id).querySelector("video").srcObject=null;
    status(id,"Disconnected");
}

</script>

</body>
</html>
